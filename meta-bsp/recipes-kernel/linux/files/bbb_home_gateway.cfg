CONFIG_TINYDRM_ILI9341=m
CONFIG_PWM=y
CONFIG_PWM_SYSFS=y
CONFIG_PWM_TIEHRPWM=y
CONFIG_PWM_TIECAP=y
CONFIG_SOUND=n
CONFIG_SND=n
CONFIG_SND_SOC=n

# Không dùng framebuffer console
CONFIG_EXPERT=y     # Phải bật EXPERT thì mới tắt được fbcon
# CONFIG_FRAMEBUFFER_CONSOLE is not set

# Không dùng USB
# CONFIG_USB_SUPPORT is not set

# Display không dùng: TFT đi qua tinydrm ILI9341 (SPI). Tắt HDMI/LCDC/OMAP-DSS/virtio-gpu.
# CONFIG_DRM_OMAP is not set
# CONFIG_DRM_TILCDC is not set
# CONFIG_DRM_I2C_NXP_TDA998X is not set
# CONFIG_DRM_VIRTIO_GPU is not set
# CONFIG_CEC_CORE is not set

# Không có phần cứng wireless
# CONFIG_WLAN is not set
# CONFIG_WIRELESS is not set
# CONFIG_RFKILL is not set

# Không chạy VM — bỏ virtio.
# CONFIG_VIRTIO_BLK is not set
# CONFIG_VIRTIO_NET is not set
# CONFIG_SCSI_VIRTIO is not set
# CONFIG_VIRTIO_CONSOLE is not set
# CONFIG_VIRTIO_MENU is not set
# CONFIG_VHOST_MENU is not set
# CONFIG_VSOCKETS is not set

# Boot từ SD/eMMC (MMC) — không dùng NAND/NOR/UBI.
# CONFIG_MTD is not set